<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Side Hustle Scout — Find Your Perfect Side Hustle</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'neon-purple': '#b44dff',
        'neon-lime': '#aaff00',
        'neon-pink': '#ff44aa',
        'neon-cyan': '#00ffcc',
        'dark': '#0a0a0f',
      },
      fontFamily: { grotesk: ['Space Grotesk', 'sans-serif'] },
      animation: {
        'float': 'float 3s ease-in-out infinite',
        'pulse-slow': 'pulse 3s ease-in-out infinite',
        'shimmer': 'shimmer 2s linear infinite',
      },
      keyframes: {
        float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-8px)' } },
        shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
      }
    }
  }
}
</script>
<style>
* { font-family: 'Space Grotesk', sans-serif; }
body { background: #0a0a0f; color: white; }
.bento { border-radius: 20px; }
.option-btn {
  transition: all 0.22s ease;
  border: 1.5px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
}
.option-btn.selected {
  border-color: #b44dff;
  background: rgba(180,77,255,0.15);
  box-shadow: 0 0 24px rgba(180,77,255,0.3);
}
.option-check { opacity: 0; transform: scale(0.5); transition: all 0.2s ease; }
.option-btn.selected .option-check { opacity: 1; transform: scale(1); }
.shimmer-text {
  background: linear-gradient(90deg, #b44dff, #aaff00, #00ffcc, #ff44aa, #b44dff);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 3s linear infinite;
}
.screen { display: none; }
.screen.active { display: block; }
.confetti-piece {
  position: fixed; width: 8px; height: 8px;
  z-index: 9999; pointer-events: none;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body class="min-h-screen overflow-x-hidden">

<div class="relative z-10 max-w-lg mx-auto px-4 py-8 min-h-screen flex flex-col">

  <div id="screen-intro" class="screen active flex flex-col items-center justify-center min-h-screen text-center gap-6">
    <div class="text-6xl animate-float">🕵️</div>
    <h1 class="text-4xl font-bold leading-tight"><span class="shimmer-text">The Side Hustle Scout</span></h1>
    <p class="text-white/50">Find your perfect hustle in 60 seconds.</p>
    <button onclick="startQuiz()" class="w-full py-4 rounded-2xl font-bold bg-neon-purple shadow-lg shadow-neon-purple/40 hover:scale-105 transition-transform">
      Find My Hustle →
    </button>
  </div>

  <div id="screen-quiz" class="screen flex flex-col gap-5">
    <div class="flex items-center gap-3">
      <div class="flex-1 h-2 bg-white/10 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-neon-purple transition-all duration-500" style="width:0%"></div>
      </div>
      <span id="progress-text" class="text-xs text-white/40">1 / 4</span>
    </div>

    <div class="bento p-6 bg-[#111118] border border-white/10">
      <h2 id="question-text" class="text-xl font-bold mb-1"></h2>
      <p id="question-sub" class="text-sm text-white/40"></p>
    </div>

    <div id="options-container" class="flex flex-col gap-3"></div>

    <button id="next-btn" onclick="nextQuestion()" disabled class="w-full py-4 rounded-2xl font-bold bg-neon-purple opacity-40 transition-all">
      Next →
    </button>
  </div>

  <div id="screen-result" class="screen flex flex-col gap-5">
    <div class="text-center">
      <div id="result-emoji" class="text-6xl mb-2 animate-float"></div>
      <h1 id="result-title" class="text-3xl font-bold shimmer-text"></h1>
      <p id="result-subtitle" class="text-white/50 text-sm mb-4"></p>
    </div>
    
    <div class="bento p-6 bg-[#111118] border border-neon-purple/30">
        <p id="result-desc" class="text-white/70 text-sm leading-relaxed"></p>
    </div>

    <div id="checklist" class="flex flex-col gap-3 bento p-6 bg-[#111118] border border-neon-lime/20"></div>

    <div class="grid grid-cols-2 gap-3">
        <div class="bento p-4 bg-white/5 border border-white/10">
            <div class="text-[10px] uppercase text-white/40">Est. Monthly</div>
            <div id="result-earning" class="text-neon-purple font-bold"></div>
        </div>
        <div class="bento p-4 bg-white/5 border border-white/10">
            <div class="text-[10px] uppercase text-white/40">Cost</div>
            <div id="result-cost" class="text-neon-cyan font-bold"></div>
        </div>
    </div>

    <button onclick="retakeQuiz()" class="w-full py-3 rounded-2xl bg-white/5 border border-white/10 text-white/40 text-sm">
      Retake Quiz
    </button>
  </div>
</div>

<script>
const QUESTIONS = [
  {
    text: 'Where do you feel most productive?',
    sub: 'Choose your natural environment',
    options: [
      { text: '🖥️ Glued to my screen', sub: 'I live online', scores: { artist: 3, ninja: 3, gear: 1 } },
      { text: '🌍 Out in the real world', sub: 'I love meeting people', scores: { local: 3, resale: 2 } },
      { text: '🏠 At home, hands-on', sub: 'I like physical things', scores: { gear: 3, resale: 3 } },
      { text: '🎨 Anywhere creative', sub: 'I create wherever', scores: { artist: 3, ninja: 2 } }
    ]
  },
  {
    text: 'What gear do you have?',
    sub: 'Be honest — this matters',
    options: [
      { text: '📱 Just my phone', sub: 'Keeping it simple', scores: { resale: 3, local: 3 } },
      { text: '💻 A decent laptop', sub: 'Ready for work', scores: { artist: 3, ninja: 3, gear: 1 } },
      { text: '🔧 Tools / Spare parts', sub: 'Hardware ready', scores: { gear: 3, resale: 2 } },
      { text: '🎮 Pro Gaming PC', sub: 'Full setup', scores: { ninja: 3, gear: 2 } }
    ]
  },
  {
    text: 'What is your best skill?',
    sub: 'What are you known for?',
    options: [
      { text: '🎨 Creative / Design', sub: 'Visual eye', scores: { artist: 3, ninja: 1 } },
      { text: '🧠 Fixing / Building', sub: 'Problem solver', scores: { gear: 3, ninja: 1 } },
      { text: '🤝 Social / Networking', sub: 'People person', scores: { local: 3, resale: 2 } },
      { text: '✂️ Eye for Detail', sub: 'Spotting trends', scores: { ninja: 3, resale: 3 } }
    ]
  },
  {
    text: 'How much time can you commit?',
    sub: 'Realistic hours per week',
    options: [
      { text: '⏰ 1 hour daily', sub: 'Consistency is key', scores: { artist: 3, ninja: 3 } },
      { text: '📅 Weekends only', sub: 'Sat & Sun grind', scores: { local: 3, gear: 3, resale: 3 } },
      { text: '🔥 All in (4+ hours)', sub: 'I am serious', scores: { artist: 3, ninja: 3, gear: 3 } },
      { text: '💤 Passive only', sub: 'Minimal effort', scores: { resale: 3, artist: 1 } }
    ]
  }
];

const RESULTS = {
  artist: { emoji: '🎨', title: 'Digital Artist', subtitle: 'Emotes & Avatars', desc: 'The market for digital assets is huge. Start on Fiverr or Discord.', earning: '$200-800', cost: '$0' },
  ninja: { emoji: '🎬', title: 'Script Ninja', subtitle: 'Video Editing', desc: 'Every creator needs an editor. Master DaVinci Resolve.', earning: '$300-1500', cost: '$0' },
  gear: { emoji: '🔧', title: 'Gear Head', subtitle: 'PC Build & Repair', desc: 'People pay well for tech support and custom builds.', earning: '$400-1200', cost: 'Tools' },
  resale: { emoji: '🏷️', title: 'Resale Pro', subtitle: 'Vintage Flipping', desc: 'Buy low on Marketplace, sell high on Depop/eBay.', earning: '$150-600', cost: '$30+' },
  local: { emoji: '🌟', title: 'Local Legend', subtitle: 'Neighborhood Services', desc: 'Car washing, pet sitting, or lawn care for cash.', earning: '$200-700', cost: '$0-20' }
};

let currentQ = 0;
let userScores = { artist: 0, ninja: 0, gear: 0, resale: 0, local: 0 };
let selectedIdx = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function startQuiz() {
  currentQ = 0;
  userScores = { artist: 0, ninja: 0, gear: 0, resale: 0, local: 0 };
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  selectedIdx = null;
  document.getElementById('progress-bar').style.width = (currentQ / QUESTIONS.length * 100) + '%';
  document.getElementById('progress-text').innerText = `${currentQ + 1} / ${QUESTIONS.length}`;
  document.getElementById('question-text').innerText = q.text;
  document.getElementById('question-sub').innerText = q.sub;

  const container = document.getElementById('options-container');
  container.innerHTML = q.options.map((opt, i) => `
    <button class="option-btn bento p-4 text-left w-full flex items-center justify-between" onclick="selectOption(${i})">
      <div>
        <div class="font-bold text-sm">${opt.text}</div>
        <div class="text-white/40 text-xs">${opt.sub}</div>
      </div>
      <div class="option-check w-5 h-5 rounded-full bg-neon-purple flex items-center justify-center">
        <svg width="10" height="8" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
    </button>
  `).join('');

  const nextBtn = document.getElementById('next-btn');
  nextBtn.disabled = true;
  nextBtn.classList.add('opacity-40');
  nextBtn.innerText = currentQ === QUESTIONS.length - 1 ? 'See Results' : 'Next →';
}

function selectOption(idx) {
  selectedIdx = idx;
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((b, i) => i === idx ? b.classList.add('selected') : b.classList.remove('selected'));
  const nextBtn = document.getElementById('next-btn');
  nextBtn.disabled = false;
  nextBtn.classList.remove('opacity-40');
}

function nextQuestion() {
  const qScores = QUESTIONS[currentQ].options[selectedIdx].scores;
  for (let key in qScores) { userScores[key] += qScores[key]; }
  
  currentQ++;
  if (currentQ < QUESTIONS.length) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  const winner = Object.keys(userScores).reduce((a, b) => userScores[a] > userScores[b] ? a : b);
  const r = RESULTS[winner];
  document.getElementById('result-emoji').innerText = r.emoji;
  document.getElementById('result-title').innerText = r.title;
  document.getElementById('result-subtitle').innerText = r.subtitle;
  document.getElementById('result-desc').innerText = r.desc;
  document.getElementById('result-earning').innerText = r.earning;
  document.getElementById('result-cost').innerText = r.cost;
  
  showScreen('result');
  launchConfetti();
}

function retakeQuiz() { showScreen('intro'); }

function launchConfetti() {
  for(let i=0; i<50; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = ['#b44dff', '#aaff00', '#ff44aa'][Math.floor(Math.random()*3)];
    c.style.animationDuration = (Math.random() * 2 + 1) + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
  }
}
</script>
</body>
</html>
